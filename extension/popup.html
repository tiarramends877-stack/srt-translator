<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #f8f9fa;
    }
    h1 {
      font-size: 17px;
      margin-bottom: 12px;
      text-align: center;
      color: #1a1a2e;
    }

    /* ---- Steps ---- */
    .steps {
      margin-bottom: 14px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #dee2e6;
      font-size: 12px;
      line-height: 1.7;
      color: #495057;
    }
    .steps .step {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .steps .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #4dabf7;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .steps code {
      font-size: 11px;
      background: #e9ecef;
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ---- Buttons ---- */
    label, button {
      display: block;
      width: 100%;
      font-size: 13px;
    }
    #file-input { display: none; }
    .file-btn {
      display: block;
      padding: 10px;
      background: #e9ecef;
      border: 2px dashed #adb5bd;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      color: #495057;
      margin-bottom: 10px;
      transition: border-color .2s, background .2s;
    }
    .file-btn:hover { border-color: #4dabf7; background: #e7f5ff; }
    .file-btn.has-file {
      border-style: solid;
      border-color: #51cf66;
      background: #ebfbee;
      color: #2b8a3e;
    }

    .btn {
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .2s, background .2s;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-translate {
      background: #4dabf7; color: #fff; margin-bottom: 8px;
    }
    .btn-translate:hover:not(:disabled) { background: #339af0; }
    .btn-translate.loading {
      background: #adb5bd;
      pointer-events: none;
    }
    .btn-download { background: #51cf66; color: #fff; }
    .btn-download:hover:not(:disabled) { background: #40c057; }

    /* ---- YouTube info ---- */
    #yt-info {
      display: none;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #fff3e0;
      border-radius: 5px;
      font-size: 11px;
      color: #e65100;
      text-align: center;
      word-break: break-word;
      line-height: 1.4;
    }
    #yt-info.visible { display: block; }
    #yt-info .yt-label { font-weight: 700; }

    /* ---- Debug ---- */
    #debug {
      margin-bottom: 10px;
      padding: 6px 8px;
      background: #f1f3f5;
      border-radius: 4px;
      font-size: 10px;
      line-height: 1.6;
      color: #868e96;
      word-break: break-all;
      font-family: "SF Mono", "Menlo", monospace;
    }
    #debug .debug-label { font-weight: 600; color: #495057; }

    /* ---- Captions box ---- */
    #captions-box {
      display: none;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #e8f5e9;
      border-radius: 5px;
      font-size: 11px;
      line-height: 1.6;
      color: #2e7d32;
    }
    #captions-box.visible { display: block; }
    #captions-box .captions-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    #captions-box label.track-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      cursor: pointer;
      font-size: 11px;
    }
    #captions-box input[type="radio"] {
      width: 13px; height: 13px;
      flex-shrink: 0;
    }
    #captions-box .tag {
      display: inline-block;
      font-size: 9px;
      padding: 0 4px;
      border-radius: 3px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .tag-asr    { background: #fff3e0; color: #e65100; }
    .tag-manual { background: #e3f2fd; color: #1565c0; }

    .btn-dl-srt {
      background: #ff9800;
      color: #fff;
      margin-top: 6px;
    }
    .btn-dl-srt:hover:not(:disabled) { background: #f57c00; }

    /* ---- Status ---- */
    #status {
      min-height: 34px;
      margin: 8px 0;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
      word-break: break-word;
    }
    .status-idle       { background: transparent; color: #868e96; }
    .status-loading    { background: #fff3bf; color: #e67700; }
    .status-success    { background: #d3f9d8; color: #2b8a3e; }
    .status-error      { background: #ffe3e3; color: #c92a2a; }
  </style>
</head>
<body>
  <h1>SRT Translator</h1>

  <div class="steps">
    <div class="step"><span class="step-num">1</span> Start local server at <code>http://localhost:8000</code></div>
    <div class="step"><span class="step-num">2</span> Choose a <code>.srt</code> file</div>
    <div class="step"><span class="step-num">3</span> Translate &amp; download <code>.zh.srt</code></div>
  </div>

  <div id="yt-info">📺 <span class="yt-label">YouTube:</span> <span id="yt-title"></span></div>

  <div id="debug">
    <div><span class="debug-label">Tab URL:</span> <span id="dbg-url">…</span></div>
    <div><span class="debug-label">YouTube:</span> <span id="dbg-is-yt">…</span></div>
    <div><span class="debug-label">Title:</span> <span id="dbg-title">…</span></div>
    <div><span class="debug-label">Captions:</span> <span id="dbg-captions">…</span></div>
  </div>

  <div id="captions-box">
    <div class="captions-title">Available Captions</div>
    <div id="captions-list"></div>
    <button class="btn btn-dl-srt" id="btn-dl-srt" disabled>Download Original SRT</button>
  </div>

  <label class="file-btn" for="file-input" id="file-label">Choose .srt file</label>
  <input type="file" id="file-input" accept=".srt">

  <button class="btn btn-translate" id="btn-translate" disabled>Translate</button>

  <div id="status" class="status-idle">Select a .srt file to begin</div>

  <button class="btn btn-download" id="btn-download" disabled>Download .zh.srt</button>

  <script src="popup.js"></script>
</body>
</html>
