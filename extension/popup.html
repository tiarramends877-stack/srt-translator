<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #f8f9fa;
    }
    h1 {
      font-size: 17px;
      margin-bottom: 12px;
      text-align: center;
      color: #1a1a2e;
    }

    /* ---- Steps ---- */
    .steps {
      margin-bottom: 14px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 6px;
      border: 1px solid #dee2e6;
      font-size: 12px;
      line-height: 1.7;
      color: #495057;
    }
    .steps .step {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .steps .step-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #4dabf7;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .steps code {
      font-size: 11px;
      background: #e9ecef;
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ---- Buttons ---- */
    label, button {
      display: block;
      width: 100%;
      font-size: 13px;
    }
    #file-input { display: none; }
    .file-btn {
      display: block;
      padding: 10px;
      background: #e9ecef;
      border: 2px dashed #adb5bd;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      color: #495057;
      margin-bottom: 10px;
      transition: border-color .2s, background .2s;
    }
    .file-btn:hover { border-color: #4dabf7; background: #e7f5ff; }
    .file-btn.has-file {
      border-style: solid;
      border-color: #51cf66;
      background: #ebfbee;
      color: #2b8a3e;
    }

    .btn {
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .2s, background .2s;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-translate {
      background: #4dabf7; color: #fff; margin-bottom: 8px;
    }
    .btn-translate:hover:not(:disabled) { background: #339af0; }
    .btn-translate.loading {
      background: #adb5bd;
      pointer-events: none;
    }
    .btn-download { background: #51cf66; color: #fff; }
    .btn-download:hover:not(:disabled) { background: #40c057; }

    /* ---- Status ---- */
    #status {
      min-height: 34px;
      margin: 8px 0;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
      word-break: break-word;
    }
    .status-idle       { background: transparent; color: #868e96; }
    .status-loading    { background: #fff3bf; color: #e67700; }
    .status-success    { background: #d3f9d8; color: #2b8a3e; }
    .status-error      { background: #ffe3e3; color: #c92a2a; }
  </style>
</head>
<body>
  <h1>SRT Translator</h1>

  <div class="steps">
    <div class="step"><span class="step-num">1</span> Start local server at <code>http://localhost:8000</code></div>
    <div class="step"><span class="step-num">2</span> Choose a <code>.srt</code> file</div>
    <div class="step"><span class="step-num">3</span> Translate &amp; download <code>.zh.srt</code></div>
  </div>

  <label class="file-btn" for="file-input" id="file-label">Choose .srt file</label>
  <input type="file" id="file-input" accept=".srt">

  <button class="btn btn-translate" id="btn-translate" disabled>Translate</button>

  <div id="status" class="status-idle">Select a .srt file to begin</div>

  <button class="btn btn-download" id="btn-download" disabled>Download .zh.srt</button>

  <script src="popup.js"></script>
</body>
</html>
