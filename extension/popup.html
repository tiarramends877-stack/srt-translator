<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #f8f9fa;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 14px;
      text-align: center;
      color: #1a1a2e;
    }
    label, button {
      display: block;
      width: 100%;
      font-size: 14px;
    }
    #file-input {
      display: none;
    }
    .file-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #e9ecef;
      border: 2px dashed #adb5bd;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      color: #495057;
      margin-bottom: 12px;
      transition: border-color .2s, background .2s;
    }
    .file-btn:hover { border-color: #4dabf7; background: #e7f5ff; }
    .file-btn.has-file { border-style: solid; border-color: #51cf66; background: #ebfbee; color: #2b8a3e; }

    .btn {
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .2s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-translate { background: #4dabf7; color: #fff; margin-bottom: 8px; }
    .btn-translate:hover:not(:disabled) { background: #339af0; }
    .btn-download { background: #51cf66; color: #fff; }
    .btn-download:hover:not(:disabled) { background: #40c057; }

    #status {
      min-height: 36px;
      margin: 10px 0;
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      word-break: break-word;
    }
    .status-idle       { background: transparent; color: #868e96; }
    .status-loading    { background: #fff3bf; color: #e67700; }
    .status-success    { background: #d3f9d8; color: #2b8a3e; }
    .status-error      { background: #ffe3e3; color: #c92a2a; }
  </style>
</head>
<body>
  <h1>🎬 SRT Translator</h1>

  <label class="file-btn" for="file-input" id="file-label">Choose .srt file</label>
  <input type="file" id="file-input" accept=".srt">

  <button class="btn btn-translate" id="btn-translate" disabled>Translate</button>

  <div id="status" class="status-idle">Select a .srt file to begin</div>

  <button class="btn btn-download" id="btn-download" disabled>Download .zh.srt</button>

  <script src="popup.js"></script>
</body>
</html>
